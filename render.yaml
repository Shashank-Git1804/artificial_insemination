services:
  # ── Node.js Backend ──────────────────────────────────────────────────────────
  - type: web
    name: pashimitra-backend
    runtime: node
    rootDir: mernStackOfAtrificialIsemination/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: FRONTEND_URL
        sync: false          # set to your Vercel URL after deploying frontend
      - key: AI_SERVICE_URL
        sync: false          # set to your Python service URL after deploying it

  # ── Python AI Service ────────────────────────────────────────────────────────
  - type: web
    name: pashimitra-ai
    runtime: python
    rootDir: mernStackOfAtrificialIsemination/backend/ai_service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BACKEND_URL
        sync: false          # set to your Node backend Render URL
